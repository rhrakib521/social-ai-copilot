<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>Social AI Copilot Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      width: 380px;
      min-height: 500px;
      max-height: 600px;
      overflow-y: auto;
    }
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      padding: 16px 20px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 .badge {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
    }
    .header p {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 4px;
    }
    .section {
      padding: 14px 20px;
      border-bottom: 1px solid #e2e8f0;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 4px;
    }
    select, input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
      margin-bottom: 10px;
      font-family: inherit;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .toggle-row span {
      font-size: 13px;
      color: #334155;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #cbd5e1;
      border-radius: 20px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: #6366f1;
    }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(16px);
    }
    .save-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 14px 20px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .save-btn:hover { opacity: 0.9; }
    .status {
      text-align: center;
      padding: 0 20px;
      font-size: 12px;
      color: #22c55e;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.show { opacity: 1; }
    .history-list {
      max-height: 150px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .history-item {
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .history-item .output-text {
      font-size: 12px;
      color: #1e293b;
      font-weight: 500;
      line-height: 1.4;
    }
    .history-item .meta {
      color: #94a3b8;
      font-size: 11px;
      margin-top: 2px;
    }
    .clear-btn {
      margin-top: 8px;
      padding: 4px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      background: #fff;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
    }
    .clear-btn:hover { background: #f1f5f9; }
    .key-hint {
      padding: 14px 20px;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
    .key-hint kbd {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 11px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="badge">AI</span> Social AI Copilot</h1>
    <p>AI-powered writing assistant for social media</p>
  </div>

  <div class="section">
    <div class="section-title">Provider</div>
    <label for="provider">AI Provider</label>
    <select id="provider">
      <option value="openai">OpenAI (GPT)</option>
      <option value="glm">GLM (Zhipu AI)</option>
      <option value="gemini">Google Gemini</option>
      <option value="deepseek">DeepSeek</option>
      <option value="qwen">Alibaba Qwen (DashScope)</option>
      <option value="backend">Backend Proxy</option>
    </select>

    <div id="apiKeyGroup">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
    </div>

    <div id="openaiModelGroup" class="hidden">
      <label for="openaiModel">OpenAI Model</label>
      <select id="openaiModel">
        <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
        <option value="gpt-4.1">GPT-4.1</option>
        <option value="gpt-4.1-nano">GPT-4.1 Nano</option>
        <option value="o4-mini">o4-mini</option>
        <option value="o3">o3</option>
        <option value="gpt-5-nano">GPT-5 Nano</option>
        <option value="gpt-5-mini">GPT-5 Mini</option>
        <option value="gpt-5">GPT-5</option>
        <option value="gpt-5.1">GPT-5.1</option>
        <option value="gpt-5-pro">GPT-5 Pro</option>
        <option value="gpt-5.2">GPT-5.2 (Flagship)</option>
        <option value="gpt-5.2-pro">GPT-5.2 Pro</option>
        <option value="custom">Custom...</option>
      </select>
      <input type="text" id="openaiModelCustom" class="hidden" placeholder="e.g. o3" autocomplete="off">
    </div>

    <div id="glmModelGroup" class="hidden">
      <label for="glmModel">GLM Model</label>
      <select id="glmModel">
        <option value="glm-4-flash">GLM-4 Flash (Free)</option>
        <option value="glm-4-air">GLM-4 Air</option>
        <option value="glm-4-plus">GLM-4 Plus</option>
        <option value="glm-4-long">GLM-4 Long</option>
        <option value="glm-4v-flash">GLM-4V Flash (Vision)</option>
        <option value="glm-5">GLM-5</option>
        <option value="glm-5.1">GLM-5.1 (Latest)</option>
        <option value="custom">Custom...</option>
      </select>
      <input type="text" id="glmModelCustom" class="hidden" placeholder="e.g. glm-z1-flash" autocomplete="off">
    </div>

    <div id="geminiModelGroup" class="hidden">
      <label for="geminiModel">Gemini Model</label>
      <select id="geminiModel">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
        <option value="gemini-3-pro-preview">Gemini 3 Pro Preview</option>
        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
        <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite Preview</option>
        <option value="custom">Custom...</option>
      </select>
      <input type="text" id="geminiModelCustom" class="hidden" placeholder="e.g. gemini-3-flash-preview-0625" autocomplete="off">
    </div>

    <div id="deepseekModelGroup" class="hidden">
      <label for="deepseekModel">DeepSeek Model</label>
      <select id="deepseekModel">
        <option value="deepseek-chat">DeepSeek Chat (V3.2)</option>
        <option value="deepseek-reasoner">DeepSeek Reasoner (V3.2 Thinking)</option>
        <option value="custom">Custom...</option>
      </select>
      <input type="text" id="deepseekModelCustom" class="hidden" placeholder="e.g. deepseek-v4" autocomplete="off">
    </div>

    <div id="qwenModelGroup" class="hidden">
      <label for="qwenModel">Qwen Model</label>
      <select id="qwenModel">
        <option value="qwen-plus">Qwen Plus</option>
        <option value="qwen-max">Qwen Max</option>
        <option value="qwen-turbo">Qwen Turbo (Fast)</option>
        <option value="qwen-turbo-latest">Qwen Turbo Latest</option>
        <option value="qwq-plus">QwQ Plus (Reasoning)</option>
        <option value="qwen-long">Qwen Long (Long Context)</option>
        <option value="qwen3-235b-a22b">Qwen3 235B (MoE)</option>
        <option value="qwen3-32b">Qwen3 32B</option>
        <option value="qwen3-30b-a3b">Qwen3 30B-A3B (MoE)</option>
        <option value="custom">Custom...</option>
      </select>
      <input type="text" id="qwenModelCustom" class="hidden" placeholder="e.g. qwen3-max" autocomplete="off">
    </div>

    <div id="backendTokenGroup" class="hidden">
      <label for="backendToken">Backend Token</label>
      <input type="password" id="backendToken" placeholder="your-backend-token" autocomplete="off">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Default Tone</div>
    <label for="defaultTone">Tone</label>
    <select id="defaultTone">
      <option value="professional">Professional</option>
      <option value="casual">Casual</option>
      <option value="witty">Witty</option>
      <option value="direct">Direct</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Platforms</div>
    <div class="toggle-row">
      <span>LinkedIn</span>
      <label class="toggle"><input type="checkbox" id="platform-linkedin" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>Facebook</span>
      <label class="toggle"><input type="checkbox" id="platform-facebook" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>X / Twitter</span>
      <label class="toggle"><input type="checkbox" id="platform-x" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>Reddit</span>
      <label class="toggle"><input type="checkbox" id="platform-reddit" checked><span class="toggle-slider"></span></label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent History</div>
    <div class="history-list" id="historyList">
      <div style="color: #94a3b8; font-size: 12px;">Loading...</div>
    </div>
    <button class="clear-btn" id="clearHistoryBtn">Clear History</button>
  </div>

  <button class="save-btn" id="saveBtn">Save Settings</button>
  <div class="status" id="status">Settings saved!</div>

  <div class="key-hint">
    Press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>A</kbd> to trigger AI Copilot
  </div>

  <script src="popup.js"></script>
</body>
</html>
