<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>Social AI Copilot Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      width: 380px;
      min-height: 500px;
      max-height: 600px;
      overflow-y: auto;
    }
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      padding: 16px 20px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 .badge {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
    }
    .header p {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 4px;
    }
    .section {
      padding: 14px 20px;
      border-bottom: 1px solid #e2e8f0;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 4px;
    }
    select, input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
      margin-bottom: 10px;
      font-family: inherit;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .toggle-row span {
      font-size: 13px;
      color: #334155;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #cbd5e1;
      border-radius: 20px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: #6366f1;
    }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(16px);
    }
    .save-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 14px 20px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .save-btn:hover { opacity: 0.9; }
    .status {
      text-align: center;
      padding: 0 20px;
      font-size: 12px;
      color: #22c55e;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.show { opacity: 1; }
    .history-list {
      max-height: 150px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .history-item {
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .history-item .output-text {
      font-size: 12px;
      color: #1e293b;
      font-weight: 500;
      line-height: 1.4;
    }
    .history-item .meta {
      color: #94a3b8;
      font-size: 11px;
      margin-top: 2px;
    }
    .clear-btn {
      margin-top: 8px;
      padding: 4px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      background: #fff;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
    }
    .clear-btn:hover { background: #f1f5f9; }
    .key-hint {
      padding: 14px 20px;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
    .key-hint kbd {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 11px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="badge">AI</span> Social AI Copilot</h1>
    <p>AI-powered writing assistant for social media</p>
  </div>

  <div class="section">
    <div class="section-title">Provider</div>
    <label for="provider">AI Provider</label>
    <select id="provider">
      <option value="openai">OpenAI (GPT)</option>
      <option value="glm">GLM (Zhipu AI)</option>
      <option value="backend">Backend Proxy</option>
    </select>

    <div id="apiKeyGroup">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
    </div>

    <div id="backendTokenGroup" class="hidden">
      <label for="backendToken">Backend Token</label>
      <input type="password" id="backendToken" placeholder="your-backend-token" autocomplete="off">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Default Tone</div>
    <label for="defaultTone">Tone</label>
    <select id="defaultTone">
      <option value="professional">Professional</option>
      <option value="casual">Casual</option>
      <option value="witty">Witty</option>
      <option value="direct">Direct</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Platforms</div>
    <div class="toggle-row">
      <span>LinkedIn</span>
      <label class="toggle"><input type="checkbox" id="platform-linkedin" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>Facebook</span>
      <label class="toggle"><input type="checkbox" id="platform-facebook" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>X / Twitter</span>
      <label class="toggle"><input type="checkbox" id="platform-x" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>Reddit</span>
      <label class="toggle"><input type="checkbox" id="platform-reddit" checked><span class="toggle-slider"></span></label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent History</div>
    <div class="history-list" id="historyList">
      <div style="color: #94a3b8; font-size: 12px;">Loading...</div>
    </div>
    <button class="clear-btn" id="clearHistoryBtn">Clear History</button>
  </div>

  <button class="save-btn" id="saveBtn">Save Settings</button>
  <div class="status" id="status">Settings saved!</div>

  <div class="key-hint">
    Press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>A</kbd> to trigger AI Copilot
  </div>

  <script src="popup.js"></script>
</body>
</html>
